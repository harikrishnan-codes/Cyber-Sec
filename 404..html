<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Security</title>
    <link rel="icon" href="./assets/bg remove.webp">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./root.css">

    <!-- material icon -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- font awesome icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- aos animations -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>

<body>

    <style>
        .red-divider {
            width: 60px;
            margin: 0 auto;
            height: 6px;
            background-color: var(--primary-red);
            margin-bottom: 2rem;
        }

        .error-page {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-black);
            text-align: center;
            padding: 0 5%;
            overflow: hidden;
            position: relative;
        }

        .error-code {
            font-family: var(--font-heading);
            font-size: 10rem;
            font-weight: 900;
            color: var(--text-main);
            position: relative;
            line-height: 1;
            letter-spacing: -5px;
        }

        .error-code::before,
        .error-code::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-black);
        }

        .error-code::before {
            left: 2px;
            text-shadow: -2px 0 var(--primary-red);
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }

        .error-code::after {
            left: -2px;
            text-shadow: -2px 0 #fff;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim2 5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% {
                clip: rect(31px, 9999px, 94px, 0);
            }

            20% {
                clip: rect(62px, 9999px, 42px, 0);
            }

            100% {
                clip: rect(89px, 9999px, 98px, 0);
            }
        }

        .status-badge-red {
            display: inline-block;
            padding: 5px 15px;
            background: rgba(244, 51, 52, 0.1);
            border: 1px solid var(--primary-red);
            color: var(--primary-red);
            font-family: var(--font-main);
            font-size: var(--text-xs);
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .error-message {
            color: var(--text-dim);
            max-width: 500px;
            margin: 0 auto 2rem;
            line-height: 1.6;
        }

        .terminal-text {
            color: var(--primary-red);
            font-family: var(--font-main);
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 6px;
        }

        .error-actions {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        @media (max-width: 768px) {
            .error-code {
                font-size: 6rem;
            }

            .error-actions {
                flex-direction: column;
            }

            .btn-primary,
            .btn-secondary {
                width: 100%;
            }
        }
    </style>

    <section class="error-page">
        <div class="glitch-wrapper">
            <div class="error-code" data-text="404">404</div>
        </div>

        <div class="error-content">
            <span class="status-badge-red">
                <i class="fas fa-exclamation-triangle"></i> ACCESS_DENIED
            </span>
            <h1 class="section-title">Encryption <span class="highlight">Mismatch</span></h1>
            <div class="red-divider"></div>
            <p class="error-message">
                The requested node <span class="terminal-text">[root/page_not_found]</span> does not exist or has been
                moved to a restricted sector. Your IP has been logged for security audit.
            </p>

            <div class="error-actions">
                <a href="index.html" class="btn-primary">Return to Secure Zone</a>
            </div>
        </div>

        <div class="binary-rain"></div>
    </section>

</body>

</html>
