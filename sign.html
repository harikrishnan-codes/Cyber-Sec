<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Security</title>
    <link rel="icon" href="./assets/bg remove.webp">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="sign.css">
    <link rel="stylesheet" href="./root.css">

    <!-- material icon -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- font awesome icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- aos animations -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>

<body>

    <div class="auth-wrapper">

        <!-- LEFT FORM -->
        <div class="auth-card">

            <!-- SIGNUP -->
            <div class="form-section active" id="signup">
                <h2>Join the Elite</h2>

                <!-- NAME -->
                <div class="field-group">
                    <input type="text" placeholder="OPERATOR_ALIAS" required>
                </div>

                <!-- EMAIL -->
                <div class="field-group">
                    <input type="email" placeholder="UPLINK_ENCRYPTED_EMAIL" required>
                </div>

                <!-- PASSWORD -->
                <div class="field-group password-box">
                    <input type="password" placeholder="PASSWORD" required>
                    <i class="fas fa-eye toggle-password"></i>
                </div>

                <!-- CONFIRM PASSWORD -->
                <div class="field-group password-box">
                    <input type="password" placeholder="CONFIRM PASSWORD" required>
                    <i class="fas fa-eye toggle-password"></i>
                </div>

                <!-- ROLE -->
                <div class="field-group">
                    <select required>
                        <option value="">SELECT USER ROLE</option>
                        <option>Administrator</option>
                        <option>Client</option>
                        <!-- <option>Security Analyst</option>
                        <option>Developer</option> -->
                    </select>
                </div>

                <!-- SERVICE TYPE -->
                <!-- <div class="field-group">
                    <select required>
                        <option value="">PROTOCOL_TYPE</option>
                        <option>Penetration Testing</option>
                        <option>Cloud Security Audit</option>
                        <option>Incident Response</option>
                        <option>Vulnerability Assessment</option>
                    </select>
                </div> -->

                <!-- TERMS -->
                <div class="checkbox-group">
                    <input type="checkbox" required>
                    <label>I agree to Secure Protocol Terms</label>
                </div>

                <button class="btn-primary">Create Account</button>

                <p class="switch-text">
                    Already have an account? <span onclick="switchForm('login')">Log In</span>
                </p>
            </div>

            <!-- LOGIN -->
            <div class="form-section" id="login">
                <h2>Secure Login</h2>

                <div class="field-group">
                    <input type="email" placeholder="EMAIL" required>
                </div>

                <div class="field-group password-box">
                    <input type="password" placeholder="PASSWORD" required>
                    <i class="fas fa-eye toggle-password"></i>
                </div>

                <button class="btn-primary">Access System</button>

                <p class="switch-text">
                    Forgot password? <span onclick="switchForm('forgot')">Reset</span>
                </p>

                <p class="switch-text">
                    New user? <span onclick="switchForm('signup')">Sign Up</span>
                </p>
            </div>

            <!-- FORGOT -->
            <div class="form-section" id="forgot">
                <h2>Recover Access</h2>

                <div class="field-group">
                    <input type="email" placeholder="ENTER REGISTERED EMAIL" required>
                </div>

                <button class="btn-primary">Send Reset Link</button>

                <p class="switch-text">
                    Back to <span onclick="switchForm('login')">Login</span>
                </p>
            </div>

        </div>

        <!-- RIGHT TERMINAL -->
        <div class="terminal">
            <div class="terminal-header">SYSTEM_LOG: ACTIVE</div>
            <div class="terminal-body">
                <p>> INITIALIZING_SECURE_CHANNEL...</p>
                <p>> WAITING_FOR_INPUT...</p>
                <p>> ENCRYPTION: AES-256</p>
                <p class="blink">_</p>
            </div>
        </div>

    </div>

    <script src="script.js"></script>

    <script>

        // SWITCH FORMS
        function switchForm(formId) {
            document.querySelectorAll('.form-section').forEach(f => {
                f.classList.remove('active');
            });

            document.getElementById(formId).classList.add('active');
        }

        // PASSWORD TOGGLE
        document.querySelectorAll('.toggle-password').forEach(icon => {
            icon.addEventListener('click', () => {
                const input = icon.previousElementSibling;

                if (input.type === "password") {
                    input.type = "text";
                    icon.classList.replace("fa-eye", "fa-eye-slash");
                } else {
                    input.type = "password";
                    icon.classList.replace("fa-eye-slash", "fa-eye");
                }
            });
        });
        






        const passwords = document.querySelectorAll('input[type="password"]');

passwords[1].addEventListener('input', () => {
    if (passwords[0].value !== passwords[1].value) {
        passwords[1].style.borderColor = "red";
    } else {
        passwords[1].style.borderColor = "green";
    }
});

    </script>

</body>

</html>
